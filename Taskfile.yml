# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: "3"

dotenv: ["local-files/secrets/.env"]

vars:
  PROJECT_ID: '{{.PROJECT_ID | default "gen-lang-client-0800253336"}}'
  REGION: '{{.REGION | default "asia-northeast1"}}'
  REGISTRY: '{{.REGISTRY | default "192.168.10.123:5000"}}'

  # Gitブランチ名を取得し、Kubernetesセーフな形式(小文字、記号置換)に変換
  GIT_BRANCH:
    sh: git rev-parse --abbrev-ref HEAD | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9]/-/g'

  # 環境変数 ENV が未設定の場合はブランチ名をデフォルトとする
  ENV: '{{.ENV | default .GIT_BRANCH | default "main"}}'

  NAMESPACE: '{{if eq .ENV "main"}}paperterrace{{else}}paperterrace-{{.ENV}}{{end}}'
  RELEASE_NAME: '{{if eq .ENV "main"}}paperterrace{{else}}paperterrace-{{.ENV}}{{end}}'

  # Resource Configurations from JSON
  BE_CPU:
    {
      sh: 'python3 -c ''import json; print(json.load(open("config/resources.json"))["backend"]["cpu"])''',
    }
  BE_MEM:
    {
      sh: 'python3 -c ''import json; print(json.load(open("config/resources.json"))["backend"]["memory"])''',
    }
  BE_STG_CPU:
    {
      sh: 'python3 -c ''import json; print(json.load(open("config/resources.json"))["backend_staging"]["cpu"])''',
    }
  BE_STG_MEM:
    {
      sh: 'python3 -c ''import json; print(json.load(open("config/resources.json"))["backend_staging"]["memory"])''',
    }

  INF_CPU:
    {
      sh: 'python3 -c ''import json; print(json.load(open("config/resources.json"))["inference"]["cpu"])''',
    }
  INF_MEM:
    {
      sh: 'python3 -c ''import json; print(json.load(open("config/resources.json"))["inference"]["memory"])''',
    }
  INF_STG_CPU:
    {
      sh: 'python3 -c ''import json; print(json.load(open("config/resources.json"))["inference_staging"]["cpu"])''',
    }
  INF_STG_MEM:
    {
      sh: 'python3 -c ''import json; print(json.load(open("config/resources.json"))["inference_staging"]["memory"])''',
    }
  INF_STG_WORKERS:
    {
      sh: 'python3 -c ''import json; print(json.load(open("config/resources.json"))["inference_staging"].get("batch_parallel_workers", 2))''',
    }

  INF_WORKERS:
    {
      sh: 'python3 -c ''import json; print(json.load(open("config/resources.json"))["inference"].get("batch_parallel_workers", 2))''',
    }

  BUILD_MACHINE:
    {
      sh: 'python3 -c ''import json; print(json.load(open("config/resources.json"))["build"]["machine_type"])''',
    }

tasks:
  # ============================================================================
  # Development Tasks
  # ============================================================================

  default:
    desc: "Show available tasks"
    cmds:
      - task --list
    silent: true

  setup:
    desc: "Setup development environment"
    cmds:
      - echo "🔧 Setting up development environment..."
      - task: redis
      - echo "✅ Development environment ready!"

  redis:
    desc: "Start Redis container for local development"
    cmds:
      - docker run -d --name paper-terrace-redis -p 6379:6379 redis:latest || docker start paper-terrace-redis

  run:
    desc: "Run backend server with hot reload"
    cmds:
      - mkdir -p local-files/logs
      - PYTHONUNBUFFERED=1 uv run --directory backend env PYTHONPATH=.:.. uvicorn app.main:app --reload --host 0.0.0.0 --port 8080 | tee -a local-files/logs/local.log

  dev:
    desc: "Run frontend dev server"
    cmds:
      - npm run dev
    dir: frontend

  dev:full:
    desc: "Run both backend and frontend in parallel"
    deps: [redis]
    cmds:
      - echo "🚀 Starting full development environment..."
      - |
        # Start backend in background
        PYTHONUNBUFFERED=1 uv run --directory backend env PYTHONPATH=.:.. uvicorn app.main:app --reload --host 0.0.0.0 --port 8080 &
        BACKEND_PID=$!

        # Start frontend in background  
        cd frontend && npm run dev &
        FRONTEND_PID=$!

        echo "Backend PID: $BACKEND_PID"
        echo "Frontend PID: $FRONTEND_PID"
        echo "Press Ctrl+C to stop both services"

        # Wait for interrupt
        trap "kill $BACKEND_PID $FRONTEND_PID 2>/dev/null; exit" INT
        wait

  build:
    desc: "Build frontend for production"
    cmds:
      - npm run build
    dir: frontend

  test:backend:v:
    desc: "Run backend tests with verbose output"
    cmds:
      - uv run --directory backend env PYTHONPATH=.:.. pytest -o "addopts=" -v

  test:backend:
    desc: "Run backend tests"
    cmds:
      - uv run --directory backend env PYTHONPATH=.:.. pytest -n auto || [ $? -eq 5 ]

  test:inference:
    desc: "Run inference service tests"
    cmds:
      - uv run --directory inference-service env PYTHONPATH=.:.. pytest -n auto || [ $? -eq 5 ]

  test:redis:
    desc: "Run redis provider tests"
    cmds:
      - uv run --directory redis_provider env PYTHONPATH=.:.. pytest -o "addopts=" || [ $? -eq 5 ]

  test:frontend:
    desc: "Run frontend tests (Vitest)"
    cmds:
      - cd frontend && npm run test || [ $? -eq 1 ]

  test:
    desc: "Run affected tests for all components (Optimized)"
    cmds:
      - task: test:backend
      - task: test:inference
      - task: test:redis
      - task: test:frontend

  test:all:
    desc: "Run all tests for all components"
    cmds:
      - uv run --directory backend env PYTHONPATH=.:.. pytest -n auto
      - uv run --directory inference-service env PYTHONPATH=.:.. pytest -n auto
      - uv run --directory redis_provider env PYTHONPATH=.:.. pytest -o "addopts="
      - cd frontend && npm run test

  lint:
    desc: "Run linting and formatting for all components"
    cmds:
      - echo "🔍 Running biome check..."
      - npx biome check --write frontend/ common/ redis_provider/
      - echo "🔍 Running backend linting..."
      - uv run --directory backend ruff check --fix .
      - echo "🔍 Running inference-service linting..."
      - uv run --directory inference-service ruff check --fix .
      - echo "🔍 Running common & shared linting..."
      - uv run --directory backend ruff check --fix ../common
      - uv run --directory redis_provider ruff check --fix .
      - echo "🔍 Running frontend linting..."
      - cd frontend && npm run lint

  clean:
    desc: "Clean temporary build files"
    cmds:
      - echo "🧹 Cleaning build artifacts..."
      - rm -rf backend/.ruff_cache backend/__pycache__ backend/app/__pycache__
      - rm -rf frontend/node_modules/.cache frontend/dist
      - rm -rf local-files/logs/*.log
      - echo "✅ Build artifacts cleaned!"

  clean:data:
    desc: "DANGER: Clear all papers, database records, and Redis cache"
    cmds:
      - echo "🧹 Clearing ALL application data..."
      - uv run --directory backend env PYTHONPATH=.:.. python3 scripts/manual_clear_cache.py
      - rm -rf backend/app/static/paper_images/* 2>/dev/null || true
      - echo "✅ Application data cleared!"

  # ============================================================================
  # Production Tasks
  # ============================================================================

  # ============================================================================
  # Database Tasks
  # ============================================================================

  db:start:
    desc: "Start Cloud SQL instance"
    cmds:
      - echo "🔄 Starting Cloud SQL instance..."
      - gcloud sql instances patch paperterrace-db --activation-policy=ALWAYS
      - task: db:wait

  db:stop:
    desc: "Stop Cloud SQL instance (save cost)"
    cmds:
      - echo "⏹️ Stopping Cloud SQL instance..."
      - gcloud sql instances patch paperterrace-db --activation-policy=NEVER

  db:wait:
    desc: "Wait for Cloud SQL to be ready"
    cmds:
      - |
        echo "⏳ Waiting for Cloud SQL to be RUNNABLE..."
        for i in {1..6}; do
          STATUS=$(gcloud sql instances describe paperterrace-db --format="value(state)")
          echo "Current state: $STATUS"
          if [ "$STATUS" = "RUNNABLE" ]; then
            echo "✅ Cloud SQL is ready"
            exit 0
          fi
          sleep 30
        done
        echo "❌ Cloud SQL did not become RUNNABLE"
        exit 1

  db:proxy:
    desc: "Port-forward Cloud SQL Proxy to localhost:15432 (run in a separate terminal)"
    cmds:
      - echo "🔌 Forwarding cloud-sql-proxy → localhost:15432 (Ctrl+C to stop)"
      - kubectl port-forward svc/cloud-sql-proxy 15432:5432 -n {{.NAMESPACE}}

  db:migrate:
    desc: "Run database migrations (auto port-forward if DATABASE_URL_LOCAL is set)"
    cmds:
      - echo "🔄 Running database migrations..."
      - |
        if [ -n "$DATABASE_URL_LOCAL" ]; then
          echo "🔌 Using DATABASE_URL_LOCAL: starting kubectl port-forward..."
          kubectl port-forward svc/cloud-sql-proxy 15432:5432 -n {{.NAMESPACE}} &
          PROXY_PID=$!
          echo "   Port-forward PID: $PROXY_PID"
          sleep 3
          DATABASE_URL="$DATABASE_URL_LOCAL" uv run --directory backend alembic upgrade head
          EXIT_CODE=$?
          kill $PROXY_PID 2>/dev/null
          wait $PROXY_PID 2>/dev/null
          echo "🔌 Port-forward stopped"
          exit $EXIT_CODE
        else
          echo "⚠️  DATABASE_URL_LOCAL not set — connecting directly via DATABASE_URL"
          echo "   (This works inside Kubernetes but likely fails locally)"
          uv run --directory backend alembic upgrade head
        fi

  db:migrate:k8s:
    desc: "Run migrations directly from inside the running backend pod (k8s only)"
    cmds:
      - echo "🔄 Running migrations inside backend pod..."
      - kubectl exec -n {{.NAMESPACE}} deployment/backend -- uv run --directory backend alembic upgrade head

  # ============================================================================
  # Staging Environment Tasks
  # ============================================================================

  # ============================================================================
  # Infrastructure Tasks
  # ============================================================================

  # ============================================================================
  # Infrastructure Tasks
  # ============================================================================

  infra:init:production:
    desc: "Initialize Terraform for production"
    cmds:
      - echo "🔧 Initializing Terraform for production..."
      - unset GOOGLE_APPLICATION_CREDENTIALS && cd local-files/infrastructure && terraform init

  infra:import:production:
    desc: "Import existing GCP resources into Terraform state (production)"
    cmds:
      - echo "📥 Importing existing resources to Terraform..."
      - unset GOOGLE_APPLICATION_CREDENTIALS && cd local-files/infrastructure && terraform import -var="project_id={{.PROJECT_ID}}" -var="region={{.REGION}}" -var="gemini_api_key=${GEMINI_API_KEY}" -var="db_password=${DB_PASSWORD}" module.iam.google_service_account.app_sa projects/{{.PROJECT_ID}}/serviceAccounts/paperterrace-sa@{{.PROJECT_ID}}.iam.gserviceaccount.com || echo "⚠️ Already imported or not found"
      - unset GOOGLE_APPLICATION_CREDENTIALS && cd local-files/infrastructure && terraform import -var="project_id={{.PROJECT_ID}}" -var="region={{.REGION}}" -var="gemini_api_key=${GEMINI_API_KEY}" -var="db_password=${DB_PASSWORD}" module.networking.google_compute_network.main projects/{{.PROJECT_ID}}/global/networks/paperterrace-vpc || echo "⚠️ Already imported or not found"
      - echo "✅ Import complete!"

  infra:plan:production:
    desc: "Plan Terraform changes for production"
    cmds:
      - echo "📋 Planning Terraform changes for production..."
      - unset GOOGLE_APPLICATION_CREDENTIALS && cd local-files/infrastructure && terraform plan -var="project_id={{.PROJECT_ID}}" -var="region={{.REGION}}" -var="gemini_api_key=${GEMINI_API_KEY}" -var="db_password=${DB_PASSWORD}"

  infra:apply:production:
    desc: "Apply Terraform changes for production"
    cmds:
      - echo "🚀 Applying Terraform changes for production..."
      - unset GOOGLE_APPLICATION_CREDENTIALS && cd local-files/infrastructure && terraform apply -var="project_id={{.PROJECT_ID}}" -var="region={{.REGION}}" -var="gemini_api_key=${GEMINI_API_KEY}" -var="db_password=${DB_PASSWORD}"

  # ============================================================================
  # Utility Tasks
  # ============================================================================

  cleanup:
    desc: "Clean up unused Docker images and containers"
    cmds:
      - echo "🧹 Cleaning up Docker resources..."
      - docker system prune -f
      - echo "✅ Docker cleanup complete!"

  # ============================================================================
  # Helm Deployment Tasks
  # ============================================================================

  helm:deploy:
    desc: "Deploy PaperTerrace using Helm"
    cmds:
      - echo "🚀 Deploying with Helm..."
      - |
        HELM_OPTS=""
        if [ "{{.ENV}}" = "dev" ]; then
          HELM_OPTS="-f ./local-files/infrastructure/helm/paperterrace/values-dev.yaml"
        fi
        helm upgrade --install {{.RELEASE_NAME}} ./local-files/infrastructure/helm/paperterrace --namespace {{.NAMESPACE}} --create-namespace $HELM_OPTS

  helm:undeploy:
    desc: "Undeploy PaperTerrace using Helm"
    cmds:
      - echo "🔥 Removing Helm release..."
      - helm uninstall {{.RELEASE_NAME}} --namespace {{.NAMESPACE}}

  helm:lint:
    desc: "Lint Helm chart"
    cmds:
      - helm lint ./local-files/infrastructure/helm/paperterrace

  # ============================================================================
  # Home Server (k3s) Deployment Tasks
  # ============================================================================

  k3s:secrets:
    desc: "Setup K8s secrets on home server"
    cmds:
      - ./local-files/scripts/create-secrets.sh {{.ENV}}

  k3s:status:
    desc: "Show status of k3s resources"
    cmds:
      - kubectl get pods,svc,deploy -n {{.NAMESPACE}}

  k3s:logs:backend:
    desc: "View backend logs in k3s"
    cmds:
      - kubectl logs -f -l app=backend -n {{.NAMESPACE}}

  k3s:logs:inference:
    desc: "View inference logs in k3s"
    cmds:
      - kubectl logs -f -l app=inference -n {{.NAMESPACE}}

  k3s:logs:inference-layout:
    desc: "View inference-layout logs in k3s"
    cmds:
      - kubectl logs -f -l app=inference-layout -n {{.NAMESPACE}}

  k3s:logs:inference-m2m100:
    desc: "View inference-m2m100 logs in k3s"
    cmds:
      - kubectl logs -f -l app=inference-m2m100 -n {{.NAMESPACE}}

  k3s:logs:inference-qwen:
    desc: "View inference-qwen logs in k3s"
    cmds:
      - kubectl logs -f -l app=inference-qwen -n {{.NAMESPACE}}

  k3s:restart:backend:
    desc: "Restart backend in k3s"
    cmds:
      - kubectl rollout restart deployment/backend -n {{.NAMESPACE}}

  k3s:restart:inference:
    desc: "Restart inference server in k3s"
    cmds:
      - kubectl rollout restart deployment/inference -n {{.NAMESPACE}} || true

  k3s:restart:inference-layout:
    desc: "Restart inference-layout in k3s"
    cmds:
      - kubectl rollout restart deployment/inference-layout -n {{.NAMESPACE}} || true

  k3s:restart:inference-m2m100:
    desc: "Restart inference-m2m100 in k3s"
    cmds:
      - kubectl rollout restart deployment/inference-m2m100 -n {{.NAMESPACE}} || true

  k3s:restart:inference-qwen:
    desc: "Restart inference-qwen in k3s"
    cmds:
      - kubectl rollout restart deployment/inference-qwen -n {{.NAMESPACE}} || true

  k3s:restart:all:
    desc: "Restart all application services in k3s"
    cmds:
      - task: k3s:restart:backend
      - task: k3s:restart:inference-layout
      - task: k3s:restart:inference-m2m100
      - task: k3s:restart:inference-qwen

  k3s:health:
    desc: "Check health of services in k3s"
    cmds:
      - echo "🔍 Checking service health in {{.NAMESPACE}}..."
      - |
        echo "Backend:"
        kubectl exec -n {{.NAMESPACE}} deployment/backend -- curl -s http://localhost:8080/api/health || \
        kubectl exec -n {{.NAMESPACE}} deployment/backend -- python3 -c "import urllib.request; print(urllib.request.urlopen('http://localhost:8080/api/health').read().decode())" || \
        echo "❌ Unhealthy"
        echo ""
        echo "Inference Server (All):"
        kubectl exec -n {{.NAMESPACE}} deployment/inference-layout -- curl -s http://localhost:8080/health 2>/dev/null && echo "✅ Inference layout" || true
        kubectl exec -n {{.NAMESPACE}} deployment/inference-m2m100 -- curl -s http://localhost:8080/health 2>/dev/null && echo "✅ Inference m2m100" || true
        kubectl exec -n {{.NAMESPACE}} deployment/inference-qwen -- curl -s http://localhost:8080/health 2>/dev/null && echo "✅ Inference qwen" || true
        echo ""
        echo "Redis:"
        kubectl exec -n {{.NAMESPACE}} statefulset/{{.RELEASE_NAME}}-redis-master -- redis-cli ping || echo "❌ Unhealthy"

  homeserver:health:
    desc: "Check health of all services"
    cmds:
      - task: k3s:health

  homeserver:build:
    desc: "Build Docker images for home server"
    env:
      REGISTRY: "{{.REGISTRY}}"
      TAG: '{{if eq .ENV "main"}}latest{{else}}{{.ENV}}{{end}}'
    cmds:
      - ./local-files/scripts/build-images.sh

  homeserver:ps:
    desc: "Show status of all services"
    cmds:
      - task: k3s:status

  # ============================================================================
  # Cloudflare Deployment Tasks
  # ============================================================================

  cf:tunnel:setup:
    desc: "Setup Cloudflare Tunnel"
    cmds:
      - ./local-files/scripts/setup-tunnel.sh

  cf:tunnel:start:
    desc: "Start Cloudflare Tunnel (k3s)"
    cmds:
      - kubectl scale deployment/cloudflared --replicas=1 -n {{.NAMESPACE}}

  cf:tunnel:logs:
    desc: "View Cloudflare Tunnel logs (k3s)"
    cmds:
      - kubectl logs -f -l app=cloudflared -n {{.NAMESPACE}}

  cf:workers:install:
    desc: "Install all dependencies (including Workers/Frontend)"
    cmds:
      - npm install

  cf:workers:deploy:
    desc: "Deploy Cloudflare Workers"
    cmds:
      - cd local-files/cloudflare-workers && npx wrangler deploy --env {{.ENV}}

  cf:pages:deploy:
    desc: "Deploy frontend to Cloudflare Pages"
    cmds:
      - echo "Building frontend for {{.ENV}}..."
      - npm run build -w frontend
      - echo "Deploying to Cloudflare Pages project {{if eq .ENV "main"}}paperterrace{{else}}paperterrace-dev{{end}}..."
      - npx wrangler pages deploy frontend/dist --project-name {{if eq .ENV "main"}}paperterrace{{else}}paperterrace-dev{{end}} --branch {{if eq .ENV "main"}}main{{else}}dev{{end}}

  cf:deploy:all:
    desc: "Deploy both Workers and Pages"
    cmds:
      - task: cf:workers:deploy
      - task: cf:pages:deploy

  cf:workers:secrets:
    desc: "Configure Cloudflare Workers secrets"
    cmds:
      - echo "Setting up Cloudflare Workers secrets for {{.ENV}}..."
      - echo "Run these commands manually:"
      - echo "  npx wrangler secret put FIREBASE_PROJECT_ID --env {{.ENV}}"
      - echo "  npx wrangler secret put FIREBASE_CLIENT_EMAIL --env {{.ENV}}"
      - echo "  npx wrangler secret put FIREBASE_PRIVATE_KEY --env {{.ENV}}"

  # ============================================================================
  # Migration Tasks
  # ============================================================================

  migrate:prepare:
    desc: "Prepare for migration to home server"
    cmds:
      - echo "📋 Migration preparation checklist:"
      - echo "1. ✓ Ensure .env file is configured"
      - echo "2. ✓ Ensure service account key is in local-files/secrets/sa-key.json"
      - echo "3. ✓ Ensure models are downloaded to ./models/"
      - echo "4. ✓ Ensure Cloudflare Tunnel is set up"
      - echo "5. ✓ Test home server deployment"
      - echo "6. ✓ Test Cloudflare Workers deployment"
      - echo "7. ✓ Verify end-to-end flow"

  migrate:test:
    desc: "Test new architecture"
    cmds:
      - echo "🧪 Testing new architecture..."
      - task: k3s:health
      - echo "Testing API Gateway..."
      - echo "Manual test required -- Visit Cloudflare Workers URL with valid token"

  migrate:switch:
    desc: "Switch traffic to new architecture"
    cmds:
      - echo "⚠️  This will switch traffic to the new architecture"
      - echo "Make sure you have tested thoroughly!"
      - echo "Update DNS to point to Cloudflare Pages"
      - echo "Monitor logs and metrics closely"
