# Cloudflare Tunnel Configuration for PaperTerrace (DEV)
# REPLACE with dev tunnel ID if using a separate tunnel
tunnel: 30987b37-17e3-41c5-be6c-3175c0520ab8
credentials-file: /etc/cloudflared/credentials.json
originRequest:
  noTLSVerify: true
  connectTimeout: 30s
  keepAliveConnections: 100
  keepAliveTimeout: 90s
ingress:
  - hostname: dev-tunnel.paperterrace.page
    service: http://backend.paperterrace-dev.svc.cluster.local:8080
  - hostname: dev-glitchtip.paperterrace.page
    service: http://glitchtip.paperterrace-dev.svc.cluster.local:8000
  - service: http_status:404
loglevel: info
no-autoupdate: true
retries: 5
protocol: quic
grace-period: 30s
heartbeat-interval: 60s
compression: true
metrics: 0.0.0.0:2000
