# PaperTerrace アプリケーション設定
# 環境切り替え: APP_ENV=local (デフォルト) / APP_ENV=staging (開発/staging) / APP_ENV=prod (本番)
# 優先順位: 実環境変数 > [prod]/[staging]/[local] セクション > [default] セクション

[default]
LOG_LEVEL = "INFO"
ACCESS_LOG_LEVEL = "INFO"

# AI Provider
AI_PROVIDER = "vertex"
AI_TEMPERATURE = 0.1
AI_MAX_OUTPUT_TOKENS = 2048
VERTEX_MODEL = "gemini-2.5-flash-lite"
MODEL_CHAT = "gemini-2.5-flash-lite"
MODEL_SUMMARY = "gemini-2.5-flash-lite"
MODEL_TRANSLATE = "gemini-2.5-flash-lite"
FIGURE_EXPLAIN_MODEL = "gemini-2.5-flash-lite"
DSPY_MODEL = "vertex_ai/gemini-2.5-flash-lite"
LAYOUT_PARSER_TYPE = "gemini"
LAYOUT_EDGE_FILTER_MARGIN_X = 0.03   # 左右端マージン（ページ幅の3%）
LAYOUT_EDGE_FILTER_MARGIN_Y = 0.01   # 上下端マージン（ページ高さの1%）
LAYOUT_MIN_WIDTH_RATIO = 0.10        # 幅がページ幅の10%以下のボックスを除外

# 翻訳モデル設定（M2M100）
TRANSLATION_BEAM_SIZE = 10
TRANSLATION_REPETITION_PENALTY = 1.1
TRANSLATION_NO_REPEAT_NGRAM_SIZE = 2
TRANSLATION_MAX_LENGTH = 1024
TRANSLATION_FALLBACK_THRESHOLD = 0.6
TRANSLATION_LENGTH_PENALTY = 0.8
TRANSLATION_TEMPERATURE = 0.8
TRANSLATION_COVERAGE_PENALTY = 0
CT2_INTER_THREADS = 1
CT2_INTRA_THREADS = 1

MAX_PDF_SIZE_MB = 50

# アプリケーション設定
BATCH_WORDS_LIMIT = 100
MAX_CONTEXT_LENGTH = 15000
MAINTENANCE_MODE = false
OCR_CHUNK_SIZE = 5
PDF_DPI = 150
MAX_CHAT_PDF_SIZE_MB = 50

# ストレージ設定
GCS_BUCKET_NAME = "paperterrace-papers"

# 推論サービス
INFERENCE_SERVICE_TIMEOUT = 200
INFERENCE_SERVICE_RETRIES = 2
SKIP_INFERENCE_SERVICE_WARMUP = true
INFERENCE_SERVICE_DISABLED = false
INFERENCE_VERIFY_SSL = true
INFERENCE_TYPE = "all"
ENABLE_OCR_CROPS = false
INFERENCE_OCR_CROPS_URL = ""
USE_OPENVINO = true
PRELOAD_MODELS = false
ENABLE_RATE_LIMIT = false

# OCR 推論サービス（ローカル PaddleOCR / OpenVINO）
INFERENCE_OCR_TIMEOUT = 120
INFERENCE_OCR_DISABLED = false
INFERENCE_OCR_MIN_PAGE_TEXT_LEN = 100
# OCR フォールバック: レイアウトブロックをライン分割する高さ (px, 150 DPI 基準)
# 12pt × (150/72) ≈ 25px + 行間 → 35px が標準的な1行高さ
OCR_LINE_HEIGHT_PX = 35
RATE_LIMIT_OCR = "120/minute"

# OCR 検出モデルのハイパーパラメータ
# 入力解像度: モデルは動的サイズ対応。学術論文では 1280 が 640 より大幅に精度向上
# メモリ要件: 1280px + 並列4リクエストで ~3.5GB → pod limit 4Gi が必要
OCR_DET_INPUT_SIZE = 1280
# DB 二値化閾値: 低いほど薄い文字を拾う (0.15〜0.35)
OCR_DET_THRESH = 0.2
# 膨張カーネル (W, H): 文字を単語レベルにまとめるため W=20 以上を推奨
# W=3 だと個別文字レベルの bbox になり認識精度が大幅低下する
# W=20, ITER=2 で約 40px 水平方向に膨張 → 英単語レベルでのマージが可能
# 行全体をまとめると認識モデルの max_w=320px 制約で圧縮されるため W は中程度に設定
OCR_DET_DILATE_KSIZE_W = 20
OCR_DET_DILATE_KSIZE_H = 3
OCR_DET_DILATE_ITER = 2
# 最小 bbox 幅: 単一文字レベルの細切れ検出を排除（px, 1280px 入力換算）
OCR_DET_MIN_BBOX_WIDTH = 25
# OpenVINO リクエストプールサイズ（メモリと並列性のトレードオフ）
# thinkpad (4GB RAM) では小さく設定すること
OCR_DET_POOL_SIZE = 2
OCR_REC_POOL_SIZE = 4

# Sentry / GlitchTip
SENTRY_ENABLED = false
SENTRY_TRACES_SAMPLE_RATE = 0.1
SENTRY_PROFILES_SAMPLE_RATE = 0.1

# レートリミット
RATE_LIMIT_REGISTERED = 120
RATE_LIMIT_GUEST = 30
RATE_LIMIT_LAYOUT = "60/minute"
RATE_LIMIT_TRANSLATE = "300/minute"

# BigQuery
BQ_LOCATION_LOGS = "asia-northeast1"

# CORS
CORS_EXTRA_ORIGINS = ""

[local]
LOG_LEVEL = "DEBUG"
STORAGE_TYPE = "local"
STORAGE_PROVIDER = "sqlite"
IMAGES_DIR = "src/static/paper_images"
BQ_LOG_DATASET = "paperterrace_logs_local"

# Local 特定設定
GCS_BUCKET_NAME_LOCAL = "paperterrace-papers-local"
INFERENCE_VERIFY_SSL = false

[staging]
LOG_LEVEL = "DEBUG"
SENTRY_ENABLED = true
STORAGE_TYPE = "gcs"
STORAGE_PROVIDER = "neon"
IMAGES_DIR = "app/static/paper_images"
BQ_LOG_DATASET = "paperterrace_logs_staging"

# Staging 特定設定
GCS_BUCKET_NAME_STAGING = "paperterrace-papers-staging"
INFERENCE_VERIFY_SSL = false

[prod]
LOG_LEVEL = "INFO"
SENTRY_ENABLED = true
STORAGE_TYPE = "gcs"
STORAGE_PROVIDER = "neon"
IMAGES_DIR = "app/static/paper_images"
BQ_LOG_DATASET = "paperterrace_logs"
INFERENCE_VERIFY_SSL = false
